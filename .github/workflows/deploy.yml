name: Deploy React App via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # Step 4: Build React app
      - name: Build app
        run: npm run build

      # Step 5: Create backup of dist/
      - name: Create backup of dist/
        run: |
          BACKUP_FILE="x6drinks-$(date +'%Y%m%d-%H%M%S').tar.gz"
          tar -czf $BACKUP_FILE ./dist
          echo "Backup file created: $BACKUP_FILE"

      # Step 6: Install lftp for backup upload
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Step 7: Upload backup to server backups/ without overwriting
      - name: Upload backup via lftp
        run: |
          export BACKUP_FILE="x6drinks-$(date +'%Y%m%d-%H%M%S').tar.gz"
          lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
            set ssl:verify-certificate no
            mkdir -p backups
            put $BACKUP_FILE -O backups
            quit
          EOF

      # Step 8: Deploy new dist/ to root folder
      - name: Deploy new dist/ to root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ./
          port: 21
