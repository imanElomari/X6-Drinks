name: 🚀 Deploy Vite React App via SFTP

on:
  push:
    branches:
      - main   # deploy when pushing to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # Step 4: Build app
      - name: Build app
        run: npm run build

      # Step 5: Deploy dist/ via SFTP
      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: atlafapt                # your cPanel username
          server: atlasimex.es                # your domain or server IP
          port: 22                           # default SFTP port
          ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
          local_path: "dist/*"               # Vite build folder
          remote_path: "/home/atlafapt/xdrinks.com/"
