name: Deploy App via FTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # Step 4: Build React app
      - name: Build app
        run: npm run build

      # Step 5: Install lftp for FTP operations
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Step 6: Backup current server x6drinks folder (excluding backups)
      - name: Backup current server x6drinks
        run: |
          mkdir -p backup_tmp
          # Mirror the server folder excluding the backups folder
          lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} -e "
            set ssl:verify-certificate no;
            mirror --verbose --exclude-glob backups ./ ./backup_tmp;
            quit
          "
          # Compress only the contents of backup_tmp
          BACKUP_FILE="x6drinks-$(date +'%Y%m%d-%H%M%S').tar.gz"
          cd backup_tmp
          tar -czf ../$BACKUP_FILE *
          cd ..
          # Prepare folder for FTP upload
          mkdir -p backup_upload
          mv $BACKUP_FILE backup_upload/

      # Step 7: Upload backup archive to server backups folder
      - name: Upload backup to server backups/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: backup_upload/
          server-dir: ./backups/
          port: 21

      # Step 8: Deploy new dist/ to root folder
      - name: Upload dist/ to root
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ./
          port: 21
